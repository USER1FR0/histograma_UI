<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histogramas Estadísticos Futuristas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #030712;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 2rem 1rem;
        }
        h1 {
            font-size: clamp(1.1rem, 3vw, 1.9rem);
            color: #00E5FF;
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px #00E5FF88;
        }
        .gif-container {
            border: 2px solid #00E5FF44;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px #00E5FF22;
            max-width: 98vw;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        p {
            margin-top: 1rem;
            color: #00E5FF99;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>&#128202; Histogramas Estadísticos Futuristas &#128202;</h1>
    <div class="gif-container">
        <img src="/histograma.gif" alt="Histogramas animados futuristas">
    </div>
    <p>&#10024; Frecuencia Absoluta &bull; Frecuencia Relativa &bull; Porcentajes &bull; Intervalos de Clase &#10024;</p>
</body>
</html>
